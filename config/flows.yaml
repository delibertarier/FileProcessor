# Main flow configuration file for FileProcessor.
#
# Define one or more flows. Each flow ties together:
# - Input/output/error/archive directories
# - CSV/fixed-width format
# - Mapping XLS file
# - Optional XSD for validation
# - Optional filters and grouping rules

flows:
  - name: example_orders_flow
    mode: csv_to_xml

    input_dir: ./data/in/orders
    success_dir: ./data/out/orders
    error_dir: ./data/error/orders
    archive_dir: ./data/archive/orders
    in_progress_dir: ./data/in_progress/orders

    file_glob: "*.csv"

    input_format: csv
    delimiter: ";"

    mapping_file: ./examples/mapping ROLLS SSW outgoing.xlsx
    xsd_file: ./examples/PLDASSW.xsd

    root_element_name: Orders

    filters:
      - column_index: 5
        operator: eq
        value: "ACTIVE"

    grouping:
      group_by_column_index: 1
      group_root_xpath: /Orders/Order
      item_xpath: /Orders/Order/Line

